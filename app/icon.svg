<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Dark background -->
  <rect width="32" height="32" rx="4" fill="#0d0a12"/>

  <!-- Crown body: 3-peak silhouette -->
  <polygon points="4,24 8,13 12,19 16,9 20,19 24,13 28,24" fill="#c9a227"/>

  <!-- Base band -->
  <rect x="4" y="23" width="24" height="4" rx="1" fill="#b8891a"/>

  <!-- Center jewel (red — fire/passion) -->
  <circle cx="16" cy="9.5" r="2" fill="#d44c2d"/>

  <!-- Left jewel (blue — knowledge) -->
  <circle cx="8" cy="13" r="1.5" fill="#0e68ab"/>

  <!-- Right jewel (green — nature) -->
  <circle cx="24" cy="13" r="1.5" fill="#00733e"/>

  <!-- Base accent dots -->
  <circle cx="11" cy="25" r="1" fill="#c9a227" opacity="0.6"/>
  <circle cx="16" cy="25" r="1.1" fill="#9c3198"/>
  <circle cx="21" cy="25" r="1" fill="#c9a227" opacity="0.6"/>
</svg>
